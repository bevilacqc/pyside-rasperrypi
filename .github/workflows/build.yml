name: Build with PyInstaller for Raspberry Pi 5 (arm64)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Package app (Raspberry Pi OS arm64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    container:
      image: vascoguita/raspios:arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            binutils
      - name: Set up Python virtual environment
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          .venv/bin/pip install -r requirements.txt

      - name: Package application with PyInstaller
        run: |
          .venv/bin/pyinstaller \
            --name pyside-rasperrypi \
            --onefile \
            --target-arch aarch64 \
            main.py

      - name: Upload packaged executable as artifact
        uses: actions/upload-artifact@v7
        with:
          name: pyside-rasperrypi-arm64
          path: dist/pyside-rasperrypi
          if-no-files-found: error

      - name: Determine release tag
        if: github.event_name != 'pull_request' && !(github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
        id: release_tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=manual-$(date +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        if: github.event_name != 'pull_request' && !(github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: dist/pyside-rasperrypi
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
