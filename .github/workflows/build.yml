name: Build with PyInstaller on Debian Trixie

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Package app (Debian Trixie 64-bit)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: python:3.13-slim-trixie

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            binutils
      - name: Set up Python virtual environment
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          .venv/bin/pip install -r requirements.txt

      - name: Package application with PyInstaller
        run: |
          .venv/bin/pyinstaller \
            --onefile \
            --name pyside-rasperrypi \
            --noconsole \
            main.py

      - name: Upload packaged executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyside-rasperrypi-debian-trixie-x86_64
          path: dist/pyside-rasperrypi
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pyside-rasperrypi
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
