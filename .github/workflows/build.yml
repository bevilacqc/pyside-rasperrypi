name: Build with PyInstaller on Debian Trixie

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Package app (Debian Trixie 64-bit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: debian:trixie

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3 \
            python3-pip \
            python3-venv \
            libgl1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            binutils \
            ca-certificates

      - name: Set up Python virtual environment
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          .venv/bin/pip install -r requirements.txt

      - name: Package application with PyInstaller
        run: |
          .venv/bin/pyinstaller \
            --onefile \
            --name pyside-rasperrypi \
            --noconsole \
            main.py

      - name: Upload packaged executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyside-rasperrypi-debian-trixie-x86_64
          path: dist/pyside-rasperrypi
          if-no-files-found: error
